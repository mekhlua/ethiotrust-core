events {
    worker_connections 1024;
}

http {
    upstream identity {
        server identity-service:8000;
    }
    
    upstream auth {
        server auth-service:8003;
    }
    
    upstream card {
        server card-service:8002;
    }
    
    upstream ai {
        server ai-verification:8001;
    }
    
    upstream security {
        server security-service:8004;
    }
    
    server {
        listen 80;
        
        location /api/v1/identity/ {
            proxy_pass http://identity/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/v1/auth/ {
            proxy_pass http://auth/;
            proxy_set_header Host $host;
        }
        
        location /api/v1/cards/ {
            proxy_pass http://card/;
            proxy_set_header Host $host;
        }
        
        location /api/v1/ai/ {
            proxy_pass http://ai/;
            proxy_set_header Host $host;
        }
        
        location /api/v1/security/ {
            proxy_pass http://security/;
            proxy_set_header Host $host;
        }
        
        location /health {
            return 200 '{"status": "healthy", "services": "all"}';
            add_header Content-Type application/json;
        }
    }
}